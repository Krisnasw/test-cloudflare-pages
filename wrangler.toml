name = 'test-cloudflare-pages'
compatibility_date = "2026-03-13"
main = "worker/index.ts"

[assets]
directory = "./dist/client"
binding = "ASSETS"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1